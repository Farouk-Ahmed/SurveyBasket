version: "2"
type: backend
tech_stack:
  - C#
  - ASP.NET Core
  - Entity Framework Core
  - SQL Server / Identity
features:
  - name: Authentication API
    description: User registration, login, JWT and refresh token
    files:
      - SurveyBasket.API/Controllers/AuthController.cs
      - SurveyBasket.Infrastructure/Services/AuthService.cs
    endpoints:
      - method: POST
        path: /api/Auth/register
        description: Register new user (email, password)
        auth_required: false
        response_schema:
          "201": id
          "400": error
      - method: POST
        path: /api/Auth/login
        description: Login with email and password
        auth_required: false
        response_schema:
          "200": jwtToken, refreshToken
          "401": invalid credentials
      - method: POST
        path: /api/Auth/refresh
        description: Refresh JWT using refresh token
        auth_required: false
        response_schema:
          "200": jwt, refreshToken
          "401": invalid token
  - name: Clients API
    description: Client profile and avatar
    files:
      - SurveyBasket.API/Controllers/ClientsController.cs
    endpoints:
      - method: GET
        path: /api/Clients/me
        description: Get current client profile
        auth_required: true
        response_schema:
          "200": profile
          "401": unauthorized
      - method: PUT
        path: /api/Clients/me
        description: Update client profile
        auth_required: true
        response_schema:
          "200": updated profile
          "400": validation error
      - method: PUT
        path: /api/Clients/me/avatar
        description: Update client avatar
        auth_required: true
        response_schema:
          "200": avatarUrl
  - name: Dashboard API
    description: Admin dashboard summary, audit logs, create user
    files:
      - SurveyBasket.API/Controllers/DashboardController.cs
    endpoints:
      - method: GET
        path: /api/Dashboard/summary
        description: Get dashboard summary
        auth_required: true
        response_schema:
          "200": summary
          "401": unauthorized
      - method: GET
        path: /api/Dashboard/audit-logs
        description: Get audit logs
        auth_required: true
        response_schema:
          "200": audit logs
      - method: POST
        path: /api/Dashboard/create-user
        description: Create new user (admin)
        auth_required: true
        response_schema:
          "201": user id
          "403": forbidden
  - name: Polls API
    description: List and manage polls
    files:
      - SurveyBasket.API/Controllers/PollsController.cs
      - SurveyBasket.Infrastructure/Services/PollService.cs
    endpoints:
      - method: GET
        path: /api/Polls
        description: Get polls list (anonymous allowed)
        auth_required: false
        response_schema:
          "200": list of polls
    depends_on:
      - Authentication
known_limitations: []
